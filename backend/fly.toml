app = "llm-train-platform-lbcxtozf"
primary_region = "sea"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[deploy]
  release_command = "poetry install"

[processes]
  app = "poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000"
